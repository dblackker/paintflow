name: Supplier Catalog Sync

on:
  schedule:
    - cron: '18 11 * * 1'
  workflow_dispatch:
    inputs:
      supplier:
        description: Optional supplier id (sherwin-williams, ppg, benjamin-moore)
        required: false
        type: string
      limit:
        description: Optional per-category scrape limit for test runs
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: supplier-catalog-sync
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.NEON_PROD }}
      DATABASE_PATH: ./data/suppliers.db
      SUPPLIER_NAV_TIMEOUT_MS: 12000
      SUPPLIER_SELECTOR_TIMEOUT_MS: 3500
      SUPPLIER_SCRAPE_TIMEOUT_MS: 180000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser runtime
        run: pnpm --filter @crewmodo/supplier-scraper exec playwright install --with-deps chromium

      - name: Build scraper
        run: pnpm --filter @crewmodo/supplier-scraper build

      - name: Scrape suppliers
        working-directory: scrapers/paint-suppliers
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required for supplier catalog hydration." >&2
            exit 1
          fi
          SUPPLIER="${{ inputs.supplier }}"
          LIMIT="${{ inputs.limit }}"
          ARGS="all"
          if [ -n "$SUPPLIER" ]; then ARGS="$SUPPLIER"; fi
          if [ -n "$LIMIT" ]; then
            node dist/index.js scrape "$ARGS" --force --limit "$LIMIT"
          else
            node dist/index.js scrape "$ARGS" --force
          fi

      - name: Show local catalog summary
        working-directory: scrapers/paint-suppliers
        run: node dist/index.js list

      - name: Hydrate Neon catalog
        working-directory: scrapers/paint-suppliers
        run: node dist/index.js hydrate-postgres
