name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: crewmodo-staging
      cancel-in-progress: true
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || '68309aec3845a76b4d2df357a9575e13' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      DATABASE_URL: ${{ secrets.NEON_STAGING }}
      PUBLIC_API_URL: https://api-staging.crewmodo.com
      VITE_API_URL: https://api-staging.crewmodo.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set GitHub secret CLOUDFLARE_API_TOKEN or CF_API_TOKEN so Wrangler can deploy."
            exit 1
          fi
          pnpm exec wrangler whoami

      - name: Build packages
        run: pnpm -r build

      - name: Run database migrations
        run: pnpm --filter @crewmodo/db db:migrate

      - name: Deploy API Worker
        run: pnpm exec wrangler deploy --config apps/api/wrangler.toml --env staging

      - name: Build web app
        run: pnpm --filter @crewmodo/web build

      - name: Deploy Pages
        run: pnpm exec wrangler pages deploy apps/web/dist --project-name crewmodo-staging --branch staging

      - name: Smoke test API
        run: curl --fail --retry 3 --retry-delay 5 https://api-staging.crewmodo.com/health
