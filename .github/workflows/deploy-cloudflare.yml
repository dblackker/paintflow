name: Deploy Cloudflare Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-demo
      cancel-in-progress: true
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PUBLIC_API_URL: https://paintflow-api-demo.danielablack.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Deploy API Worker
        run: pnpm exec wrangler deploy --config apps/api/wrangler.toml --env demo

      - name: Build web app
        run: pnpm --filter @paintflow/web build

      - name: Deploy Pages
        run: pnpm exec wrangler pages deploy apps/web/dist --project-name paintflow-demo --branch main
