name: Deploy Production

on:
  push:
    branches:
      - production
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to deploy, for example main or v1.0.0
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: crewmodo-production
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID || '68309aec3845a76b4d2df357a9575e13' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      DATABASE_URL: ${{ secrets.NEON_PROD }}
      PUBLIC_API_URL: https://api.crewmodo.com
      VITE_API_URL: https://api.crewmodo.com
      CLOUDFLARE_PAGES_PROJECT: crewmodo-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set GitHub secret CLOUDFLARE_API_TOKEN or CF_API_TOKEN so Wrangler can deploy."
            exit 1
          fi
          pnpm exec wrangler whoami

      - name: Load web build environment
        run: |
          node <<'NODE'
          const fs = require('node:fs/promises');

          (async () => {
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const projectName = process.env.CLOUDFLARE_PAGES_PROJECT;
          const token = process.env.CLOUDFLARE_API_TOKEN;

          const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const payload = await response.json();
          if (!response.ok || !payload.success) {
            console.error(`Failed to load Cloudflare Pages project config for ${projectName}.`);
            process.exit(1);
          }

          const envVar = payload.result?.deployment_configs?.production?.env_vars?.VITE_GOOGLE_MAPS_API_KEY;
          if (envVar?.value) {
            console.log('VITE_GOOGLE_MAPS_API_KEY loaded from Cloudflare Pages project config.');
            await fs.appendFile(process.env.GITHUB_ENV, `VITE_GOOGLE_MAPS_API_KEY=${envVar.value}\n`);
          } else {
            console.warn('VITE_GOOGLE_MAPS_API_KEY is not configured in Cloudflare Pages. Address autocomplete will fall back to manual entry.');
          }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Build packages
        run: pnpm -r build

      - name: Run database migrations
        run: pnpm --filter @crewmodo/db db:migrate

      - name: Deploy API Worker
        run: pnpm exec wrangler deploy --config apps/api/wrangler.toml --env production

      - name: Build web app
        run: pnpm --filter @crewmodo/web build

      - name: Deploy Pages
        run: pnpm exec wrangler pages deploy apps/web/dist --project-name crewmodo-web --branch production

      - name: Smoke test API
        run: curl --fail --retry 3 --retry-delay 5 https://api.crewmodo.com/health
