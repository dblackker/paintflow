name: Deploy Production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to deploy, for example main or v1.0.0
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: crewmodo-production
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PUBLIC_API_URL: https://api.crewmodo.com
      VITE_API_URL: https://api.crewmodo.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Deploy API Worker
        run: pnpm exec wrangler deploy --config apps/api/wrangler.toml --env production

      - name: Build web app
        run: pnpm --filter @crewmodo/web build

      - name: Deploy Pages
        run: pnpm exec wrangler pages deploy apps/web/dist --project-name crewmodo-web --branch main

      - name: Smoke test API
        run: curl --fail --retry 3 --retry-delay 5 https://api.crewmodo.com/health
