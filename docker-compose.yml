services:
  db:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}
      PARENT_BRANCH_ID: ${PARENT_BRANCH_ID:-}
      BRANCH_ID: ${BRANCH_ID:-}
      DELETE_BRANCH: ${DELETE_BRANCH:-false}
    volumes:
      - ./.neon_local:/tmp/.neon_local
      - ./.git/HEAD:/tmp/.git/HEAD:ro

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.local
    working_dir: /workspace
    depends_on:
      - db
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
    environment:
      CI: "true"
      DATABASE_URL: postgres://neon:npg@db:5432/neondb?sslmode=no-verify
    command: sh -lc "corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @crewmodo/db db:migrate"

  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    working_dir: /workspace
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8787:8787"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
    environment:
      CI: "true"
      DATABASE_URL: postgres://neon:npg@db:5432/neondb?sslmode=no-verify
      APP_URL: http://127.0.0.1:8787
      PUBLIC_URL: http://127.0.0.1:4321
      CORS_ORIGINS: http://localhost:4321,http://127.0.0.1:4321
      ENVIRONMENT: development
      CRON_SECRET: dev-cron-secret
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_replace_me}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_replace_me}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    command: >
      sh -lc "corepack enable &&
      corepack pnpm install --frozen-lockfile &&
      cd apps/api &&
      corepack pnpm exec wrangler dev --ip 0.0.0.0 --port 8787
      --var DATABASE_URL:$$DATABASE_URL
      --var APP_URL:$$APP_URL
      --var PUBLIC_URL:$$PUBLIC_URL
      --var CORS_ORIGINS:$$CORS_ORIGINS
      --var ENVIRONMENT:$$ENVIRONMENT
      --var CRON_SECRET:$$CRON_SECRET
      --var STRIPE_SECRET_KEY:$$STRIPE_SECRET_KEY
      --var STRIPE_WEBHOOK_SECRET:$$STRIPE_WEBHOOK_SECRET
      --var TWILIO_ACCOUNT_SID:$$TWILIO_ACCOUNT_SID
      --var TWILIO_AUTH_TOKEN:$$TWILIO_AUTH_TOKEN
      --var TWILIO_PHONE_NUMBER:$$TWILIO_PHONE_NUMBER"

  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    working_dir: /workspace
    depends_on:
      - api
    ports:
      - "4321:4321"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
    environment:
      CI: "true"
      PUBLIC_API_URL: http://127.0.0.1:8787
    command: sh -lc "corepack enable && corepack pnpm install --frozen-lockfile && cd apps/web && corepack pnpm exec astro dev --host 0.0.0.0 --port 4321"

volumes:
  node_modules:
  api_node_modules:
  web_node_modules:
  db_node_modules:
