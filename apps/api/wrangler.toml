name = "paintflow-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
APP_URL = "http://localhost:8787"
PUBLIC_URL = "https://app.paintflow.app"
CORS_ORIGINS = "http://localhost:4321,https://app.paintflow.app,https://paintflow.app"
ENVIRONMENT = "development"
VAPID_PUBLIC_KEY = ""
VAPID_SUBJECT = "mailto:admin@paintflow.app"

[[kv_namespaces]]
binding = "KV"
id = "your_kv_namespace_id"
preview_id = "your_preview_kv_namespace_id"

[[r2_buckets]]
binding = "R2"
bucket_name = "paintflow-uploads"
preview_bucket_name = "paintflow-uploads-preview"

[triggers]
crons = ["0 9 * * *"]

[env.production]
vars = { APP_URL = "https://api.paintflow.app", PUBLIC_URL = "https://app.paintflow.app", CORS_ORIGINS = "https://app.paintflow.app,https://paintflow.app", ENVIRONMENT = "production", COOKIE_DOMAIN = ".paintflow.app", STRIPE_STARTER_PRICE_ID = "price_replace_starter", STRIPE_PRO_PRICE_ID = "price_replace_pro", STRIPE_ENTERPRISE_PRICE_ID = "price_replace_enterprise", VAPID_PUBLIC_KEY = "", VAPID_SUBJECT = "mailto:admin@paintflow.app" }
routes = [
  { pattern = "api.paintflow.app/*", zone_name = "paintflow.app" }
]

[[env.production.kv_namespaces]]
binding = "KV"
id = "prod_kv_namespace_id"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "paintflow-uploads"

[env.staging]
vars = { APP_URL = "https://api-staging.paintflow.app", PUBLIC_URL = "https://staging.paintflow.app", CORS_ORIGINS = "https://staging.paintflow.app", ENVIRONMENT = "staging", COOKIE_DOMAIN = ".paintflow.app", STRIPE_STARTER_PRICE_ID = "price_replace_starter_test", STRIPE_PRO_PRICE_ID = "price_replace_pro_test", STRIPE_ENTERPRISE_PRICE_ID = "price_replace_enterprise_test", VAPID_PUBLIC_KEY = "", VAPID_SUBJECT = "mailto:admin@paintflow.app" }
