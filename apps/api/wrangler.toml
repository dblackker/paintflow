name = "crewmodo-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
APP_URL = "http://localhost:8787"
PUBLIC_URL = "https://app.crewmodo.com"
CORS_ORIGINS = "http://localhost:4321,https://app.crewmodo.com,https://crewmodo.com"
ENVIRONMENT = "development"
VAPID_PUBLIC_KEY = "BNpeOQPq_i5tyMu_nJpFApLXmErRPBlWlwAzCplyvr4P3WQyEIW3kWi-qqkCPg7DmfzynDRMMcUrdkk0gdjaC6c"
VAPID_SUBJECT = "mailto:admin@crewmodo.com"
EMAIL_PROVIDER = "resend"
EMAIL_FROM = "no-reply@mail.crewmodo.com"
EMAIL_FROM_NAME = "Crewmodo"
OPENAI_OCR_MODEL = "gpt-4.1-mini"
OCR_BURST_LIMIT_PER_MINUTE = "5"
OCR_DAILY_LIMIT = "25"
OCR_MONTHLY_ESTIMATED_COST_LIMIT_USD = "50"
INBOUND_INVOICE_EMAIL_DOMAIN = "receipts.crewmodo.com"
STRIPE_STARTER_PRICE_ID = "price_1TdOdxFDz3Lb7DedDQL4mYmC"
STRIPE_PRO_PRICE_ID = "price_1TdOevFDz3Lb7DedrHHj3i5h"
STRIPE_ENTERPRISE_PRICE_ID = "price_1TdOflFDz3Lb7Ded2refwHR9"

[[kv_namespaces]]
