version: '3.8'

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paint-supplier-scraper
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
    environment:
      - DATABASE_PATH=/app/data/suppliers.db
      - LOG_LEVEL=info
      - LOG_FILE=/app/logs/scraper.log
      - RATE_LIMIT_MS=1000
      - MAX_RETRIES=3
      - HEADLESS=true
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium-browser
    env_file:
      - .env
    networks:
      - scraper-network
    restart: unless-stopped
    # Run weekly via cron or manual trigger
    # For manual runs: docker-compose run --rm scraper npm run scrape

  # Optional: Add a cron scheduler container
  scheduler:
    image: alpine:latest
    container_name: scraper-scheduler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts
    command: |
      sh -c "
        apk add --no-cache docker-cli
        echo '0 2 * * 0 docker exec paint-supplier-scraper npm run scrape >> /var/log/scraper-cron.log 2>&1' | crontab -
        crond -f
      "
    depends_on:
      - scraper
    networks:
      - scraper-network
    profiles:
      - cron

  # Optional: Web UI for monitoring (simple file server)
  monitor:
    image: nginx:alpine
    container_name: scraper-monitor
    ports:
      - "8080:80"
    volumes:
      - ./logs:/usr/share/nginx/html/logs:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - scraper-network
    profiles:
      - monitor

networks:
  scraper-network:
    driver: bridge

volumes:
  scraper-data:
  scraper-logs:
